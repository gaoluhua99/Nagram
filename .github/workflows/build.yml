# ============================================================
#  Nagram TV - GitHub Actions 编译工作流
#  文件路径: .github/workflows/build.yml
#
#  功能：
#    1. 手动触发（workflow_dispatch）随时构建
#    2. push 到 main 分支自动构建
#    3. 分阶段并行编译原生库（FFmpeg / BoringSSL / JNI）
#    4. Gradle 打包 Release APK
#    5. 上传到 GitHub Release（自动打 tag）
#    6. 可选：发送 APK 到 Telegram 频道
#
#  使用前准备（见文末"配置说明"）：
#    Secrets: LOCAL_PROPERTIES
#    可选 Secrets: HELPER_BOT_TOKEN, HELPER_BOT_TARGET
# ============================================================

name: Nagram TV Build

on:
  # 手动触发，可选择是否发布 Release 和是否推送到 Telegram
  workflow_dispatch:
    inputs:
      publish_release:
        description: '是否发布 GitHub Release'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      send_telegram:
        description: '是否发送到 Telegram（需要配置 BOT_TOKEN 和 BOT_TARGET）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

  # push 到 main 分支自动触发
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE/**'

# ── 全局环境变量 ──────────────────────────────────────────────
env:
  NDK_VERSION: 27.2.12479018

# ── Job 1: 编译 FFmpeg / libvpx ──────────────────────────────
jobs:
  ffmpeg:
    name: 原生编译 (FFmpeg)
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 展开 settings.gradle 注释
        run: sed -i 's/\/\///g' settings.gradle

      - name: 获取子模块状态（用于缓存 key）
        run: |
          git submodule status TMessagesProj/jni/ffmpeg > ffmpeg_status
          git submodule status TMessagesProj/jni/libvpx > libvpx_status

      - name: 恢复 FFmpeg 缓存
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            TMessagesProj/jni/ffmpeg/build
            TMessagesProj/jni/libvpx/build
          key: ffmpeg-${{ hashFiles('ffmpeg_status', 'libvpx_status', 'TMessagesProj/jni/*ffmpeg*.sh', 'TMessagesProj/jni/*libvpx*.sh', 'TMessagesProj/jni/patches/ffmpeg/*') }}

      - name: 配置 JDK 17
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 配置 Python 3.12
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 配置 Android SDK
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        uses: android-actions/setup-android@v3

      - name: 安装 NDK ${{ env.NDK_VERSION }}
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          echo "y" | sdkmanager --install "ndk;${{ env.NDK_VERSION }}" --sdk_root=${ANDROID_SDK_ROOT} &> /dev/null
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "ndk.dir=${ANDROID_HOME}/ndk/${{ env.NDK_VERSION }}" >> local.properties

      - name: 编译 FFmpeg & libvpx
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          git submodule update --init TMessagesProj/jni/ffmpeg
          git submodule update --init TMessagesProj/jni/libvpx
          ./run init action ffmpeg
          ./run init libs libvpx
          ./run init libs ffmpeg

# ── Job 2: 编译 BoringSSL ─────────────────────────────────────
  boringssl:
    name: 原生编译 (BoringSSL)
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 展开 settings.gradle 注释
        run: sed -i 's/\/\///g' settings.gradle

      - name: 获取子模块状态
        run: git submodule status TMessagesProj/jni/boringssl > boringssl_status

      - name: 恢复 BoringSSL 缓存
        id: cache-boringssl
        uses: actions/cache@v4
        with:
          path: TMessagesProj/jni/boringssl/build
          key: boringssl-${{ hashFiles('boringssl_status') }}

      - name: 配置 JDK 17
        if: steps.cache-boringssl.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 配置 Android SDK
        if: steps.cache-boringssl.outputs.cache-hit != 'true'
        uses: android-actions/setup-android@v3

      - name: 安装 NDK ${{ env.NDK_VERSION }}
        if: steps.cache-boringssl.outputs.cache-hit != 'true'
        run: |
          echo "y" | sdkmanager --install "ndk;${{ env.NDK_VERSION }}" --sdk_root=${ANDROID_SDK_ROOT} &> /dev/null
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "ndk.dir=${ANDROID_HOME}/ndk/${{ env.NDK_VERSION }}" >> local.properties

      - name: 编译 BoringSSL
        if: steps.cache-boringssl.outputs.cache-hit != 'true'
        run: |
          git submodule update --init TMessagesProj/jni/boringssl
          ./run init action boringssl
          ./run init libs boringssl

# ── Job 3: 编译 Telegram JNI 原生库（arm64-v8a / armeabi-v7a）──
  native:
    name: 原生编译 (JNI) [${{ matrix.flavor }}]
    runs-on: ubuntu-latest
    needs: [ffmpeg, boringssl]
    strategy:
      fail-fast: false
      matrix:
        flavor:
          - arm64-v8a     # 主流64位，TV设备基本都是这个
          - armeabi-v7a   # 32位兼容，覆盖老设备
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 展开 settings.gradle 注释
        run: sed -i 's/\/\///g' settings.gradle

      - name: 获取子模块状态
        run: |
          git submodule status TMessagesProj/jni/ffmpeg > ffmpeg_status
          git submodule status TMessagesProj/jni/libvpx > libvpx_status
          git submodule status TMessagesProj/jni/boringssl > boringssl_status

      - name: 恢复 JNI 编译缓存
        id: cache-native
        uses: actions/cache@v4
        with:
          path: TMessagesProj/src/main/libs
          key: native-${{ matrix.flavor }}-${{ hashFiles('TMessagesProj/jni/**', 'ffmpeg_status', 'boringssl_status') }}

      - name: 检出 JNI 子模块
        if: steps.cache-native.outputs.cache-hit != 'true'
        run: git submodule update --init 'TMessagesProj/jni/*'

      - name: 恢复 FFmpeg 缓存
        if: steps.cache-native.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: |
            TMessagesProj/jni/ffmpeg/build
            TMessagesProj/jni/libvpx/build
          key: ffmpeg-${{ hashFiles('ffmpeg_status', 'libvpx_status', 'TMessagesProj/jni/*ffmpeg*.sh', 'TMessagesProj/jni/*libvpx*.sh', 'TMessagesProj/jni/patches/ffmpeg/*') }}

      - name: 恢复 BoringSSL 缓存
        if: steps.cache-native.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: TMessagesProj/jni/boringssl/build
          key: boringssl-${{ hashFiles('boringssl_status') }}

      - name: 配置 JDK 17
        if: steps.cache-native.outputs.cache-hit != 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 配置 Android SDK
        if: steps.cache-native.outputs.cache-hit != 'true'
        uses: android-actions/setup-android@v3

      - name: 安装 NDK ${{ env.NDK_VERSION }}
        if: steps.cache-native.outputs.cache-hit != 'true'
        run: |
          echo "y" | sdkmanager --install "ndk;${{ env.NDK_VERSION }}" --sdk_root=${ANDROID_SDK_ROOT} &> /dev/null
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "ndk.dir=${ANDROID_HOME}/ndk/${{ env.NDK_VERSION }}" >> local.properties

      - name: 修复 BoringSSL 头文件
        if: steps.cache-native.outputs.cache-hit != 'true'
        run: |
          cd TMessagesProj/jni
          ./patch_boringssl.sh

      - name: 编译 JNI [${{ matrix.flavor }}]
        if: steps.cache-native.outputs.cache-hit != 'true'
        run: |
          export NATIVE_TARGET="${{ matrix.flavor }}"
          ./run libs native

# ── Job 4: Gradle 打包 APK ────────────────────────────────────
  build:
    name: Gradle 打包 APK
    runs-on: ubuntu-latest
    needs: [native]
    outputs:
      version_name: ${{ steps.get_version.outputs.version_name }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 展开 settings.gradle 注释
        run: sed -i 's/\/\///g' settings.gradle

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 NDK ${{ env.NDK_VERSION }}
        run: |
          echo "y" | sdkmanager --install "ndk;${{ env.NDK_VERSION }}" --sdk_root=${ANDROID_SDK_ROOT} &> /dev/null
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "ndk.dir=${ANDROID_HOME}/ndk/${{ env.NDK_VERSION }}" >> local.properties

      - name: 获取子模块状态
        run: |
          git submodule status TMessagesProj/jni/ffmpeg > ffmpeg_status
          git submodule status TMessagesProj/jni/boringssl > boringssl_status

      - name: 恢复 JNI 缓存 (arm64-v8a)
        uses: actions/cache@v4
        with:
          path: TMessagesProj/src/main/libs
          key: native-arm64-v8a-${{ hashFiles('TMessagesProj/jni/**', 'ffmpeg_status', 'boringssl_status') }}

      - name: 恢复 JNI 缓存 (armeabi-v7a)
        uses: actions/cache@v4
        with:
          path: TMessagesProj/src/main/libs
          key: native-armeabi-v7a-${{ hashFiles('TMessagesProj/jni/**', 'ffmpeg_status', 'boringssl_status') }}

      - name: 写入构建时间戳
        run: sed -i "s/2000000000000/$(date +%s%3N)/g" gradle.properties

      - name: 读取版本号
        id: get_version
        run: |
          VERSION=$(grep "^APP_VERSION_NAME=" gradle.properties | cut -d'=' -f2)
          BUILD=$(grep "^APP_BUILD_TIMESTAMP=" gradle.properties | cut -d'=' -f2)
          echo "version_name=v${VERSION}" >> $GITHUB_OUTPUT
          echo "版本: v${VERSION} (build: ${BUILD})"

      - name: 配置 Gradle 缓存
        uses: gradle/actions/setup-gradle@v4
      



      - name: 编译 Release APK
        env:
          LOCAL_PROPERTIES: ${{ secrets.LOCAL_PROPERTIES }}
        run: |
          ./gradlew TMessagesProj:assembleRelease \
            --build-cache \
            --no-configuration-cache \
            --stacktrace

      - name: 整理 APK 文件
        id: collect_apk
        run: |
          mkdir -p artifacts
          find TMessagesProj/build/outputs/apk -name "*.apk" ! -name "*unsigned*" | while read f; do
            echo "找到 APK: $f"
            cp "$f" artifacts/
          done
          ls -lh artifacts/

      - name: 上传 APK 到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Nagram-TV-APK
          path: artifacts/*.apk
          retention-days: 7

      - name: 保存 gradle.properties（供后续 job 读取版本）
        uses: actions/upload-artifact@v4
        with:
          name: gradle-properties
          path: gradle.properties

# ── Job 5: 发布 GitHub Release ────────────────────────────────
  release:
    name: 发布 GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    # 仅在手动触发且选择发布，或 push 到 main 时执行
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true')
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 APK
        uses: actions/download-artifact@v4
        with:
          name: Nagram-TV-APK
          path: release/

      - name: 下载 gradle.properties
        uses: actions/download-artifact@v4
        with:
          name: gradle-properties
          path: .

      - name: 读取版本信息
        id: version
        run: |
          VERSION=$(grep "^APP_VERSION_NAME=" gradle.properties | cut -d'=' -f2)
          BUILD_CODE=$(grep "^APP_VERSION_CODE=" gradle.properties | cut -d'=' -f2 2>/dev/null || echo "")
          TAG="v${VERSION}-tv"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag: ${TAG}"

      - name: 生成 Release 说明
        run: |
          echo "## Nagram TV ${{ steps.version.outputs.version }}" > release_notes.md
          echo "" >> release_notes.md
          echo "### 本次构建" >> release_notes.md
          echo "- 构建时间: $(date -u '+%Y-%m-%d %H:%M UTC')" >> release_notes.md
          echo "- 提交: ${{ github.sha }}" >> release_notes.md
          echo "" >> release_notes.md
          echo "### TV 版新增功能" >> release_notes.md
          echo "- 左侧频道列表 + 右侧视频网格布局" >> release_notes.md
          echo "- 仅显示视频内容（过滤文字/图片/音乐）" >> release_notes.md
          echo "- 遥控器完整支持（OK键/方向键/返回键）" >> release_notes.md
          echo "- 全屏播放器（快进/快退/进度条）" >> release_notes.md
          echo "- 安卓TV桌面图标支持（LEANBACK_LAUNCHER）" >> release_notes.md
          echo "" >> release_notes.md
          echo "### APK 说明" >> release_notes.md
          echo "- \`arm64-v8a\`: 适用于 **64位** 安卓TV（主流，推荐）" >> release_notes.md
          echo "- \`armeabi-v7a\`: 适用于 **32位** 老设备" >> release_notes.md
          echo "- \`afat\`: 同时包含两种架构（通用版，体积较大）" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 安装方式" >> release_notes.md
          echo "\`\`\`bash" >> release_notes.md
          echo "adb connect 电视IP:5555" >> release_notes.md
          echo "adb install -r Nagram-*.apk" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          echo "" >> release_notes.md
          git log -5 --pretty=format:"- %s" >> release_notes.md

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Nagram TV ${{ steps.version.outputs.version }}"
          body_path: release_notes.md
          files: release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ── Job 6: 发送到 Telegram（可选）────────────────────────────
  telegram:
    name: 发送到 Telegram
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.send_telegram == 'true'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 APK
        uses: actions/download-artifact@v4
        with:
          name: Nagram-TV-APK
          path: artifacts/Nagram-TV-APK/

      - name: 下载 gradle.properties
        uses: actions/download-artifact@v4
        with:
          name: gradle-properties
          path: .

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install -r bin/scripts/requirements.txt

      - name: 生成说明文字
        run: |
          VERSION=$(grep "^APP_VERSION_NAME=" gradle.properties | cut -d'=' -f2)
          echo "Nagram TV v${VERSION}" > artifacts/caption.txt
          echo "" >> artifacts/caption.txt
          git log -1 --pretty=format:"%s%n%n%b" >> artifacts/caption.txt

      - name: 发送到 Telegram 频道
        run: |
          python bin/scripts/upload.py \
            ${{ secrets.HELPER_BOT_TOKEN }} \
            ${{ secrets.HELPER_BOT_TARGET }} \
            release
